name = "ukraine-territory-analytics"
main = "src/index.ts"
compatibility_date = "2024-11-01"

# Create DB: npx wrangler d1 create ukraine-visits
# Put the generated database_id below:
[[d1_databases]]
binding = "DB"
database_name = "ukraine-visits"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

# Production: wrangler secret put ADMIN_PASSWORD
# Local dev (optional): uncomment and set for wrangler dev only — do not commit real passwords.
# [vars]
# ADMIN_PASSWORD = "local-only"
