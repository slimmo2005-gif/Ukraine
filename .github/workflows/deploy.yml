name: Deploy to GitHub Pages

on:
  push:
    branches: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-gh-pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify territory data bundle
        run: |
          node --input-type=module -e "
          import fs from 'node:fs';
          const p = 'public/data/manifest.json';
          if (!fs.existsSync(p)) {
            console.error('::error::Missing public/data/manifest.json');
            console.error('Run Actions → Sync territory data and deploy once first.');
            process.exit(1);
          }
          const m = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (!Array.isArray(m.daily) || m.daily.length < 1) {
            console.error('::error::No daily snapshots in bundle.');
            console.error('Run Actions → Sync territory data and deploy once first.');
            process.exit(1);
          }
          console.log('Bundle OK:', m.daily.length, 'daily files');
          "

      - name: Build
        env:
          VITE_ANALYTICS_API_URL: https://ukraine-territory-analytics.slimmo2005-gif.workers.dev
        run: npm run build

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'deploy: site build from main'
