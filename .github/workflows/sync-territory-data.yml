# Clone ukraine-territory-data (git only, no REST API), bundle, commit, deploy to gh-pages branch.
name: Sync territory data and deploy

on:
  schedule:
    - cron: '0 8 * * *'
      timezone: Australia/Melbourne
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-territory-data
  cancel-in-progress: false

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout app
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone territory data repository
        run: |
          REPO="https://github.com/slimmo2005-gif/ukraine-territory-data.git"
          if ! git clone --depth 1 --single-branch --branch master "$REPO" .data-source 2>/dev/null; then
            git clone --depth 1 --single-branch --branch main "$REPO" .data-source
          fi

      - name: Bundle JSON into public/data
        run: node scripts/bundle-data-from-clone.mjs .data-source

      - name: Build site
        env:
          VITE_ANALYTICS_API_URL: https://ukraine-territory-analytics.slimmo2005-gif.workers.dev
        run: npm run build

      - name: Commit bundled data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): sync territory bundle from ukraine-territory-data"
            git push
          fi

      - name: Deploy to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'deploy: sync territory data and site build'
