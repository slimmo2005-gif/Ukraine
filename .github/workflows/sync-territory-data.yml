# Mirror territory JSON into public/data/ and deploy (same-origin for corporate firewalls).
name: Sync territory data and deploy

on:
  # 8:00 Australia/Melbourne — requires newer GitHub Actions; falls back to ~21:00 UTC if ignored.
  schedule:
    - cron: '0 8 * * *'
      timezone: Australia/Melbourne
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: 'Only sync files to repo (no Pages deploy)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: sync-territory-data
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync territory data bundle
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-territory-data.mjs

      - name: Commit bundled data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): sync territory bundle from ukraine-territory-data"
            git push
          fi

  build-deploy:
    needs: sync
    if: github.event_name != 'workflow_dispatch' || inputs.skip_deploy != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Pull latest (after sync commit)
        run: git pull --ff-only

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify data bundle present
        run: test -f public/data/manifest.json

      - name: Build
        env:
          VITE_ANALYTICS_API_URL: https://ukraine-territory-analytics.slimmo2005-gif.workers.dev
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build-deploy
    if: github.event_name != 'workflow_dispatch' || inputs.skip_deploy != true
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
